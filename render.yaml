# Production static site: https://armith.onrender.com (Render name: armith-frontend).
# If this file is not linked as a Blueprint, SPA rewrites must be set in the Dashboard (see README).
services:
  # Backend Service
  - type: web
    name: kyc-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://armith.onrender.com
    healthCheckPath: /health

  # Frontend Service (same output as Dashboard rootDir ./frontend → publish ./build → repo path frontend/build)
  - type: web
    name: kyc-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    # SPA: Clerk completes sign-in with a full navigation to /admin?__clerk_handshake=… — CDN must serve index.html
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: REACT_APP_API_URL
        value: https://armith-backend-live.onrender.com
