# Frontend: Prefer a Node Web Service + `serve -s build` so /admin deep links work without CDN rewrites.
# If you keep a Static Site instead, add Dashboard rewrite /* → /index.html (README).
services:
  # Backend Service
  - type: web
    name: kyc-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://armith.onrender.com
    healthCheckPath: /health

  # Frontend — Node + serve SPA fallback (Clerk redirects to /admin?__clerk_handshake=… need index.html).
  # Match Render Dashboard: Root Directory ./frontend → buildCommand/startCommand run inside frontend/.
  # To migrate from Static Site: create this Web Service (or Blueprint sync), then remove the old static site.
  - type: web
    name: kyc-frontend
    env: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: IGNORE_DOCS_BUILD
        value: "1"
      - key: REACT_APP_API_URL
        value: https://armith-backend-live.onrender.com
